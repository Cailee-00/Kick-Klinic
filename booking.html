<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Booking - KickKlinic</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&display=swap" rel="stylesheet">

<style>
body{
font-family:'Outfit',sans-serif;
background:#eef4ff;
}

.input{
width:100%;
padding:18px;
border-radius:20px;
border:1px solid #dbeafe;
}
</style>
</head>

<body>

<nav class="flex justify-between items-center px-8 py-6 bg-white shadow-sm">
<a href="index.html" class="text-4xl font-black text-blue-600">👟 KickKlinic</a>
<a href="services.html" class="bg-blue-600 text-white px-7 py-3 rounded-full font-bold">Services</a>
</nav>

<section class="max-w-3xl mx-auto px-8 py-20">

<h1 class="text-5xl font-black text-center mb-10">Book Your Cleaning</h1>

<form action="https://formspree.io/f/mjgzkoze" method="POST" class="space-y-6">

<input class="input" name="name" placeholder="Your Name" required>
<input class="input" name="email" placeholder="Your Email" required>
<input class="input" name="shoe" placeholder="Shoe Model" required>

<select class="input" name="service">
<option>Basic - $0.50</option>
<option>Essential - $1.00</option>
<option>Luxury - $2.00</option>
<option>Premium - $3.00</option>
</select>

<textarea class="input" name="message" placeholder="Notes..." rows="5"></textarea>

<button class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold">
Submit Booking
</button>

</form>

</section>

</body>
</html>

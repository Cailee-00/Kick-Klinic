<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KickKlinic</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&display=swap" rel="stylesheet">

<style>

body{
font-family:'Outfit',sans-serif;
background:#eef4ff;
overflow-x:hidden;
}

.glass{
background:rgba(255,255,255,.65);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.4);
}

.hero-bg{
background:
radial-gradient(circle at top left,#ffffff 0%,#edf4ff 40%,#dbeafe 100%);
}

.blur-circle{
position:absolute;
border-radius:9999px;
filter:blur(90px);
opacity:.45;
pointer-events:none;
}

</style>
</head>

<body>

<!-- TOP BAR -->

<div class="bg-gradient-to-r from-blue-600 to-sky-500 text-white text-center py-3 text-xs font-bold tracking-[4px] uppercase">
✨ Premium Footwear Care ✨
</div>

<!-- NAV -->

<nav class="flex justify-between items-center px-8 py-6 bg-white/80 backdrop-blur-xl sticky top-0 z-50">

<h1 class="text-4xl md:text-5xl font-black text-blue-600">
👟 KickKlinic
</h1>

<div class="flex gap-5">

<a href="services.html"
class="bg-white border border-slate-200 px-7 py-3 rounded-full font-bold hover:bg-slate-100 transition">
Services
</a>

<a href="booking.html"
class="bg-gradient-to-r from-blue-600 to-sky-500 text-white px-7 py-3 rounded-full font-bold shadow-xl hover:scale-105 transition">
Booking
</a>

</div>

</nav>

<!-- HERO -->

<section class="hero-bg relative overflow-hidden min-h-screen flex items-center">

<div class="blur-circle w-96 h-96 bg-blue-300 top-0 left-0"></div>
<div class="blur-circle w-[500px] h-[500px] bg-sky-200 bottom-0 right-0"></div>

<div class="max-w-7xl mx-auto px-8 py-24 relative z-10">

<div class="grid lg:grid-cols-2 gap-16 items-center">

<!-- LEFT -->

<div>

<div class="glass rounded-[50px] p-10 md:p-14 shadow-2xl">

<h2 class="text-5xl md:text-7xl font-black leading-[0.95] text-slate-900">

KEEP YOUR
<span class="block text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-sky-400">
KICKS CRISP
</span>

</h2>

<p class="mt-8 text-lg text-slate-600 leading-relaxed">
Professional sneaker cleaning and restoration for dirty shoes, tough stains, odors, and deep cleans.
</p>

<div class="flex flex-wrap gap-4 mt-10">

<a href="services.html"
class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-bold shadow-xl hover:scale-105 transition">
View Services
</a>

<a href="booking.html"
class="bg-white text-slate-800 px-8 py-4 rounded-2xl font-bold border border-slate-200 hover:bg-slate-100 transition">
Book Cleaning
</a>

</div>

</div>

</div>

<!-- RIGHT -->

<div class="relative flex justify-center items-center">

<div class="absolute inset-0 bg-blue-400/10 blur-3xl rounded-full"></div>

<img
src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&w=1200&q=80"
alt="Blue Sneaker"
class="w-full max-w-[650px] rounded-[40px] object-cover shadow-2xl"
/>

</div>

</div>

</div>

</section>

</body>
</html>

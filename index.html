<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KickKlinic</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&display=swap" rel="stylesheet">

<style>
body{
font-family:'Outfit',sans-serif;
background:#eef4ff;
overflow-x:hidden;
}

.glass{
background:rgba(255,255,255,.65);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.4);
}

.hero-bg{
background:radial-gradient(circle at top left,#ffffff 0%,#edf4ff 40%,#dbeafe 100%);
}

.blur-circle{
position:absolute;
border-radius:9999px;
filter:blur(90px);
opacity:.45;
pointer-events:none;
}
</style>
</head>

<body>

<div class="bg-gradient-to-r from-blue-600 to-sky-500 text-white text-center py-3 text-xs font-bold tracking-[4px] uppercase">
✨ Premium Footwear Care ✨
</div>

<nav class="flex justify-between items-center px-8 py-6 bg-white/80 backdrop-blur-xl sticky top-0 z-50">

<h1 class="text-4xl font-black text-blue-600">👟 KickKlinic</h1>

<div class="flex gap-5">
<a href="services.html" class="bg-white border px-7 py-3 rounded-full font-bold">Services</a>
<a href="booking.html" class="bg-blue-600 text-white px-7 py-3 rounded-full font-bold">Booking</a>
</div>

</nav>

<section class="hero-bg min-h-screen flex items-center relative overflow-hidden">

<div class="blur-circle w-96 h-96 bg-blue-300 top-0 left-0"></div>
<div class="blur-circle w-[500px] h-[500px] bg-sky-200 bottom-0 right-0"></div>

<div class="max-w-7xl mx-auto px-8 py-24 relative z-10 grid lg:grid-cols-2 gap-16 items-center">

<div class="glass rounded-[50px] p-10 md:p-14 shadow-2xl">

<h2 class="text-5xl font-black text-slate-900 leading-tight">
KEEP YOUR<br>
<span class="text-blue-600">KICKS CRISP</span>
</h2>

<p class="mt-6 text-slate-600">
Professional sneaker cleaning & restoration.
</p>

<div class="flex gap-4 mt-8">
<a href="services.html" class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-bold">View Services</a>
<a href="booking.html" class="bg-white border px-8 py-4 rounded-2xl font-bold">Book Now</a>
</div>

</div>

<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&w=1200&q=80"
class="rounded-[40px] shadow-2xl">

</div>
</section>

</body>
</html>
